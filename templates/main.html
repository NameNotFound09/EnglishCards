<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Тренажер слов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <style>
        body { background-color: #121212; height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; }
        .main-card { width: 100%; max-width: 500px; border-radius: 15px; background-color: #1e1e1e; border: 1px solid #333; }
        .form-control { background-color: #2b2b2b; border: 1px solid #444; color: #fff; }
        .form-control:focus { background-color: #333; color: #fff; border-color: #198754; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <!-- Блок FLASH сообщений -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show border-0">{{ message }}
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="card main-card shadow-lg">
                <div class="card-body p-4 text-center">
                    {% if word %}
                        <h2 class="mb-4">Переведи слово: <span class="text-success">{{ word }}</span></h2>

                        <form action="" method="post" autocomplete="off">
                            <input type="hidden" name="current_word" value="{{ word }}">

                            <div class="mb-3">
                                <input type="text" name="translation" class="form-control form-control-lg text-center" placeholder="Введите перевод" autofocus>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" name="action" value="button_input_word" class="btn btn-success btn-lg">Проверить</button>
                                <button type="submit" name="action" value="word_bank" class="btn btn-outline-light">Мой банк слов</button>
                            </div>
                        </form>
                    {% else %}
                        <div class="py-4">
                            <h4 class="text-muted">Ваш банк слов пока пуст</h4>
                            <form action="" method="post">
                                <button type="submit" name="action" value="word_bank" class="btn btn-success mt-3">Добавить слова</button>
                            </form>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4" crossorigin="anonymous" defer></script>
</body>
</html>
