<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Словарь</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container bg-white shadow-sm p-4 rounded">
        <form method="POST" action="/words" class="mb-4">
            <button type="submit" class="btn btn-secondary" name="home" value="home">← На главную</button>
        </form>

        <table class="table table-hover">
          <thead class="table-dark">
            <tr>
              <th scope="col" style="width: 5%">#</th>
              <th scope="col">Слово</th>
              <th scope="col">Перевод</th>
              <th scope="col" style="width: 10%">Действие</th>
            </tr>
          </thead>
          <tbody>
            <!-- Строка добавления слова -->
            <tr>
                <form method="POST" action="/words">
                    <th scope="row">+</th>
                    <td>
                        <input name="new_word" type="text" class="form-control" placeholder="Слово" required>
                    </td>
                    <td>
                        <input name="new_translation" type="text" class="form-control" placeholder="Перевод" required>
                    </td>
                    <td>
                        <button type="submit" class="btn btn-success w-100" name="add_word" value="add_word">Добавить</button>
                    </td>
                </form>
            </tr>

            <!-- Список существующих слов -->
            {% for word_key, word_data in words.items() %}
            <tr>
                <th scope="row">{{ loop.index }}</th>
                <td>{{ word_key }}</td>
                <td>{{ word_data.translation }}</td>
                <td>
                    <form method="POST" action="/words">
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100" name="action" value="{{ word_key }}">Удалить</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
    </div>
</body>
</html>
